<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Requirement | DevConnect</title>
    <link rel="stylesheet" href="./css/auth-premium.css">
    <link rel="stylesheet" href="./css/landing.css">
    <link rel="stylesheet" href="./css/premium-global.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="premium-layout">
    <div class="page-loader"><div class="loader-orb"></div></div>
    <div class="scroll-progress"></div>
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <nav class="navbar scrolled"><div class="nav-container"><a href="owner-dashboard.html" class="logo magnetic">DevConnect</a></div></nav>

    <main class="main-content container mt-nav">
        <div class="aura-card neon-border p-40 reveal" style="max-width: 800px; margin: 0 auto; background: rgba(15, 23, 42, 0.4);">
            <header class="mb-40">
                <span class="section-tag-p">New Mission Assignment</span>
                <h1 class="shimmer-text" style=\"font-size: 3rem;\">Project Definition</h1>
                <p class="text-muted">Broadcast your requirements to the global freelancer network.</p>
            </header>

            <form id="requirementForm" class="stagger-reveal">
                <div class="form-group mb-24">
                    <label class="white mb-8 block font-600 small uppercase letter-spacing-1">Sector Class (Project Type)</label>
                    <select id="projectType" class="glass-input-premium w-100" required>
                        <option value=\"Web Development\">Web Core Development</option>
                        <option value=\"Mobile App\">Mobile Interface Design</option>
                        <option value=\"UI/UX Design\">User Experience Research</option>
                        <option value=\"Graphic Design\">Visual Asset Creation</option>
                    </select>
                </div>

                <div class="grid-2 gap-20 mb-20">
                    <div class="form-group">
                        <label class="white mb-8 block font-600 small uppercase letter-spacing-1">Resource Allocation (Budget)</label>
                        <input type="text" id="budget" class="glass-input-premium w-100" placeholder=\"e.g. 5,000 - 10,000 Credits\" required>
                    </div>
                    <div class="form-group">
                        <label class="white mb-8 block font-600 small uppercase letter-spacing-1">Target Completion (Deadline)</label>
                        <input type="date" id="deadline" class="glass-input-premium w-100" required>
                    </div>
                </div>

                <div class="form-group mb-40">
                    <label class="white mb-8 block font-600 small uppercase letter-spacing-1">Project Specification</label>
                    <textarea id="description" class="glass-input-premium w-100" rows=\"6\" placeholder=\"Detailed technical requirements and mission goals...\" required></textarea>
                </div>

                <div class="flex gap-20">
                    <button type="submit" class="liquid-btn primary-btn magnetic" style="flex: 2;">Broadcast Assignment</button>
                    <a href="owner-dashboard.html" class="cta-outline magnetic" style="flex: 1; text-align: center;">Discard</a>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        requireAuth('owner');
        const user = getCurrentUser();

        document.getElementById('requirementForm').onsubmit = (e) => {
            e.preventDefault();
            const req = {
                id: Date.now().toString(),
                userId: user.id,
                projectType: document.getElementById('projectType').value,
                budget: document.getElementById('budget').value,
                deadline: document.getElementById('deadline').value,
                description: document.getElementById('description').value,
                createdAt: new Date().toISOString()
            };
            const reqs = getClientRequirements();
            reqs.push(req);
            saveClientRequirements(reqs);
            window.location.href = 'owner-dashboard.html';
        };
    </script>
</body>
</html>
