<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - DevConnect</title>
    <meta name="description" content="Create and edit your freelancer profile">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/premium-global.css">
</head>

<body>
    <div class="dashboard-container">
        <div class="bg-animation">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>

        <nav class="navbar">
            <div class="navbar-content">
                <a href="freelancer-dashboard.html" class="navbar-brand">
                    <svg class="navbar-brand-icon" viewBox="0 0 100 100" fill="none">
                        <path d="M30 20L50 40L70 20M30 80L50 60L70 80M20 30L40 50L20 70M80 30L60 50L80 70"
                            stroke="url(#gradient)" stroke-width="4" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea" />
                                <stop offset="100%" style="stop-color:#764ba2" />
                            </linearGradient>
                        </defs>
                    </svg>
                    DevConnect
                </a>
                <div class="navbar-actions">
                    <button class="logoutButton" data-action="logout-premium">
                        <span class="button-text">Log Out</span>
                        <div class="doorway">
                            <svg class="door" viewBox="0 0 24 28" xmlns="http://www.w3.org/2000/svg">
                                <!-- Main door fill — CSS sets colour to indigo -->
                                <rect x="0" y="0" width="24" height="28" rx="2"/>
                                <!-- Upper left glass panel -->
                                <rect x="2.5" y="2.5" width="8" height="10" rx="1" fill="rgba(255,255,255,0.25)"/>
                                <!-- Upper right glass panel -->
                                <rect x="13.5" y="2.5" width="8" height="10" rx="1" fill="rgba(255,255,255,0.25)"/>
                                <!-- Lower panel -->
                                <rect x="2.5" y="15.5" width="19" height="10" rx="1" fill="rgba(255,255,255,0.13)"/>
                                <!-- Door knob -->
                                <circle cx="19.5" cy="14.5" r="1.8" fill="rgba(255,255,255,0.9)"/>
                                <circle cx="19.5" cy="14.5" r="0.8" fill="rgba(150,150,200,0.6)"/>
                            </svg>
                            <svg class="figure" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Edit Your Profile</h1>
                <p class="page-subtitle">Showcase your skills and attract project owners</p>
            </div>

            <form id="profileForm" class="profile-form">
                <!-- Basic Information -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Basic Information</h2>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" id="name" name="name" required placeholder="Your full name">
                        </div>

                        <div class="form-group">
                            <label for="roleType">Role Type *</label>
                            <select id="roleType" name="roleType" required>
                                <option value="">Select role type</option>
                                <option value="Frontend">Frontend Freelancer</option>
                                <option value="Backend">Backend Freelancer</option>
                                <option value="Fullstack">Fullstack Freelancer</option>
                                <option value="Mobile">Mobile Freelancer</option>
                                <option value="DevOps">DevOps Freelancer</option>
                                <option value="UI/UX">UI/UX Freelancer</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="availability">Availability Status *</label>
                            <select id="availability" name="availability" required>
                                <option value="">Select availability</option>
                                <option value="Available">Available</option>
                                <option value="Busy">Busy</option>
                                <option value="Not Available">Not Available</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="bio">Bio / About *</label>
                        <textarea id="bio" name="bio" rows="4" required
                            placeholder="Tell project owners about yourself, your experience, and what makes you unique..."></textarea>
                        <small id="bioCount">0 / 500 characters</small>
                    </div>
                </div>

                <!-- Skills -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Skills</h2>
                        <p class="card-subtitle">Add your technical skills (press Enter to add)</p>
                    </div>

                    <div class="form-group">
                        <label for="skillInput">Add Skills *</label>
                        <input type="text" id="skillInput" placeholder="e.g., React, Node.js, Python">
                        <small>Press Enter or click Add to add a skill</small>
                    </div>

                    <div id="skillsContainer" class="skills-container"></div>
                </div>

                <!-- Projects -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Projects</h2>
                        <p class="card-subtitle">Showcase your best work</p>
                    </div>

                    <div id="projectsContainer"></div>

                    <button type="button" class="add-btn" id="addProjectBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="16" />
                            <line x1="8" y1="12" x2="16" y2="12" />
                        </svg>
                        Add Project
                    </button>
                </div>

                <!-- Links -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Links & Contact</h2>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="github">GitHub Profile</label>
                            <input type="url" id="github" name="github" placeholder="https://github.com/username">
                        </div>

                        <div class="form-group">
                            <label for="portfolio">Portfolio Website</label>
                            <input type="url" id="portfolio" name="portfolio" placeholder="https://yourportfolio.com">
                        </div>

                        <div class="form-group">
                            <label for="linkedin">LinkedIn Profile</label>
                            <input type="url" id="linkedin" name="linkedin"
                                placeholder="https://linkedin.com/in/username">
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="form-actions">
                    <button type="submit" class="submit-btn">
                        Save Profile
                        <span class="btn-arrow">→</span>
                    </button>
                    <a href="freelancer-dashboard.html" class="cancel-btn">Cancel</a>
                </div>
            </form>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/freelancer.js"></script>
</body>

</html>
