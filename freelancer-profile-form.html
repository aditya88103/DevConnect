<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Identity | DevConnect</title>
    <link rel="stylesheet" href="./css/auth-premium.css">
    <link rel="stylesheet" href="./css/landing.css">
    <link rel="stylesheet" href="./css/premium-global.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="premium-layout">
    <div class="page-loader"><div class="loader-orb"></div></div>
    <div class="scroll-progress"></div>
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    
    <nav class="navbar scrolled"><div class="nav-container">
        <a href="freelancer-dashboard.html" class="logo magnetic">DevConnect</a>
    </div></nav>

    <main class="main-content container mt-nav">
        <div class="aura-card neon-border p-40 reveal" style="max-width: 800px; margin: 0 auto; background: rgba(15, 23, 42, 0.4);">
            <header class="mb-40">
                <span class="section-tag-p">Identity Matrix Settings</span>
                <h1 class="shimmer-text" style=\"font-size: 3rem;\">Profile Configuration</h1>
                <p class="text-muted">Define your professional parameters to optimize discovery.</p>
            </header>

            <form id="profileForm" class="stagger-reveal">
                <div class="grid-2 gap-20 mb-20">
                    <div class="form-group">
                        <label class="white mb-8 block font-600 small uppercase letter-spacing-1">Professional Niche</label>
                        <input type="text" id="title" class="glass-input-premium w-100" placeholder="e.g. Senior Full-Stack Architect" required>
                    </div>
                    <div class="form-group">
                        <label class="white mb-8 block font-600 small uppercase letter-spacing-1">Geographic Node</label>
                        <input type="text" id="location" class="glass-input-premium w-100" placeholder="e.g. Remote / Mars" required>
                    </div>
                </div>

                <div class="form-group mb-20">
                    <label class="white mb-8 block font-600 small uppercase letter-spacing-1">Professional Abstract (Bio)</label>
                    <textarea id="bio" class="glass-input-premium w-100" rows="5" placeholder="Highlight your unique value proposition..." required></textarea>
                </div>

                <div class="form-group mb-40">
                    <label class="white mb-8 block font-600 small uppercase letter-spacing-1">Skill Array (Comma separated)</label>
                    <input type="text" id="skills" class="glass-input-premium w-100" placeholder="React, Kubernetes, Web3, Python" required>
                </div>

                <div class="flex gap-20">
                    <button type="submit" class="liquid-btn primary-btn magnetic" style="flex: 2;">Deploy Update</button>
                    <a href="freelancer-dashboard.html" class="cta-outline magnetic" style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        requireAuth('freelancer');
        const user = getCurrentUser();
        if (user.title) document.getElementById('title').value = user.title;
        if (user.location) document.getElementById('location').value = user.location;
        if (user.bio) document.getElementById('bio').value = user.bio;
        if (user.skills) document.getElementById('skills').value = user.skills.join(', ');

        document.getElementById('profileForm').onsubmit = (e) => {
            e.preventDefault();
            const updated = {
                ...user,
                title: document.getElementById('title').value,
                location: document.getElementById('location').value,
                bio: document.getElementById('bio').value,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim())
            };
            updateUser(updated);
            alert('Identity sync complete!');
            window.location.href = 'freelancer-dashboard.html';
        };
    </script>
</body>
</html>
