<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DevConnect</title>
    <meta name="description" content="Login to your DevConnect account">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="bg-animation">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>

        <div class="auth-content">
            <div class="auth-header">
                <a href="index.html" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19L5 12L12 5" />
                    </svg>
                    Back to Home
                </a>
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Sign in to continue to DevConnect</p>
            </div>

            <div class="role-selector">
                <button class="role-tab active" data-role="developer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 18L22 12L16 6M8 6L2 12L8 18" />
                    </svg>
                    Developer
                </button>
                <button class="role-tab" data-role="client">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M21 16V8C21 6.9 20.1 6 19 6H5C3.9 6 3 6.9 3 8V16C3 17.1 3.9 18 5 18H19C20.1 18 21 17.1 21 16Z" />
                    </svg>
                    Client
                </button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="submit-btn">
                    Sign In
                    <span class="btn-arrow">→</span>
                </button>

                <p class="auth-switch">
                    Don't have an account? <a href="signup.html" id="signupLink">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/theme.js"></script>
    <script>
        // Handle role selection from URL
        const urlParams = new URLSearchParams(window.location.search);
        const roleFromUrl = urlParams.get('role');

        if (roleFromUrl) {
            document.querySelectorAll('.role-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.role === roleFromUrl) {
                    tab.classList.add('active');
                }
            });
        }

        // Role tab switching
        document.querySelectorAll('.role-tab').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                // Update signup link
                const role = this.dataset.role;
                document.getElementById('signupLink').href = `signup.html?role=${role}`;
            });
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const activeRole = document.querySelector('.role-tab.active').dataset.role;

            // Find user
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password && u.role === activeRole);

            if (!user) {
                alert('Invalid email or password, or wrong role selected!');
                return;
            }

            // Login
            login(user);

            // Redirect based on role
            if (activeRole === 'developer') {
                window.location.href = 'developer-dashboard.html';
            } else {
                window.location.href = 'client-dashboard.html';
            }
        });
    </script>
</body>

</html>
