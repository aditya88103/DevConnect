<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - DevConnect</title>
    <link rel="stylesheet" href="css/auth-premium.css">
    <style>
        .role-selection-container {
            display: flex;
            gap: 30px;
            padding: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .role-choice-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 300px;
            text-align: center;
            transition: 0.4s;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-primary);
        }

        .role-choice-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .role-icon-large {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .role-choice-card h2 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .role-choice-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
            z-index: 10;
        }

        .page-title h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .page-title p {
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19L5 12L12 5" />
        </svg>
        Back to Home
    </a>

    <div class="area">
        <ul class="circles">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div>

    <div class="content-wrapper">
        <div class="page-title">
            <h1>Welcome to DevConnect</h1>
            <p>Please select your account type to continue</p>
        </div>

        <div class="role-selection-container">
            <a href="freelancer-auth.html" class="role-choice-card">
                <svg class="role-icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 18L22 12L16 6M8 6L2 12L8 18" />
                </svg>
                <h2>Freelancer</h2>
                <p>I want to showcase my skills and find projects to work on.</p>
            </a>

            <a href="owner-auth.html" class="role-choice-card">
                <svg class="role-icon-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                <h2>Project Owner</h2>
                <p>I want to post requirements and hire talented freelancers.</p>
            </a>
        </div>
    </div>
</body>

</html>
