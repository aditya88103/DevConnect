<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Freelancers - DevConnect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/premium-global.css">
</head>

<body class="premium-layout">
    <div class="page-loader">
        <div class="loader-orb"></div>
    </div>
    <div class="scroll-progress"></div>
    <div class="cursor-glow"></div>
    <div class="orb-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav class="navbar scrolled">
        <div class="nav-container">
            <div class="nav-left">
                <a href="owner-dashboard.html" class="logo magnetic">DevConnect</a>
                <div class="nav-links">
                    <a href="owner-dashboard.html">Nexus</a>
                    <a href="browse-freelancers.html" class="active">Talent Pool</a>
                    <a href="messages.html">HoloChat</a>
                </div>
            </div>
            <div class="nav-right">
                <button class="logoutButton magnetic" data-action="logout-premium">
                    <span class="button-text">Log Out</span>
                    <div class="doorway">
                        <svg class="door" viewBox="0 0 24 28" xmlns="http://www.w3.org/2000/svg">
                            <rect x="0" y="0" width="24" height="28" rx="2" />
                            <rect x="2.5" y="2.5" width="8" height="10" rx="1" fill="rgba(255,255,255,0.25)" />
                            <rect x="13.5" y="2.5" width="8" height="10" rx="1" fill="rgba(255,255,255,0.25)" />
                            <rect x="2.5" y="15.5" width="19" height="10" rx="1" fill="rgba(255,255,255,0.13)" />
                            <circle cx="19.5" cy="14.5" r="1.8" fill="rgba(255,255,255,0.9)" />
                            <circle cx="19.5" cy="14.5" r="0.8" fill="rgba(150,150,200,0.6)" />
                        </svg>
                        <svg class="figure" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z" />
                        </svg>
                    </div>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content container mt-nav">
        <div class="dashboard-header reveal mb-60">
            <span class="section-tag-p">Talent Discovery</span>
            <h1 class="shimmer-text" style="font-size: 3.5rem;">Freelancer Nexus</h1>
            <p class="text-muted">Direct uplink to global specialists and world-class engineers.</p>
        </div>

        <div class="grid-1-3 mb-60">
            <div class="aura-card p-30 reveal" style="background: rgba(15, 23, 42, 0.4);">
                <div class="search-box mb-0">
                    <input type="text" id="searchInput" class="glass-input w-100"
                        placeholder="Search by name, skills, or bio..." style="padding-left: 45px !important;">
                    <i class="fas fa-search"
                        style="position: absolute; left: 15px; top: 15px; color: var(--accent-glow);"></i>
                </div>
            </div>
            <div class="aura-card p-30 reveal flex gap-15 items-center"
                style="background: rgba(15, 23, 42, 0.4); grid-column: span 2;">
                <select id="roleFilter" class="glass-input" style="flex: 1;">
                    <option value="">All Disciplines</option>
                    <option value="Frontend">Frontend Specialist</option>
                    <option value="Backend">Backend Architect</option>
                    <option value="Fullstack">Fullstack Engineer</option>
                    <option value="Mobile">Mobile Expert</option>
                    <option value="UI/UX">Design Strategist</option>
                </select>
                <select id="availabilityFilter" class="glass-input" style="flex: 1;">
                    <option value="">All Availability</option>
                    <option value="Available">Available Now</option>
                    <option value="Busy">Occupied</option>
                </select>
                <select id="sortBy" class="glass-input" style="flex: 1;">
                    <option value="">Priority Match</option>
                    <option value="newest">Latest Entry</option>
                    <option value="projects">Performance</option>
                </select>
            </div>
        </div>

        <div id="freelancersContainer" class="stagger-reveal"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px;">
            <!-- Freelancers via JS -->
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/premium-effects.js"></script>
    <script>
        requireAuth('client');

        const user = getCurrentUser();

        function renderFreelancers() {
            const query = document.getElementById('searchInput').value;
            const filters = {
                roleType: document.getElementById('roleFilter').value,
                availability: document.getElementById('availabilityFilter').value,
                sortBy: document.getElementById('sortBy').value
            };

            const freelancers = searchFreelancers(query, filters);
            const container = document.getElementById('freelancersContainer');

            if (freelancers.length === 0) {
                container.innerHTML = `
                    <div class="aura-card p-80 text-center reveal" style="grid-column: 1 / -1;">
                        <div class="icon mb-30" style="font-size: 4rem; opacity: 0.2;">📡</div>
                        <h3 class="white mb-10">No Signals Detected</h3>
                        <p class="text-muted">Adjust your frequency filters to find matching nodes.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = freelancers.map((profile, i) => {
                const isUserBookmarked = isBookmarked(user.id, profile.userId);
                const avatar = profile.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=6366f1&color=fff`;

                return `
                    <div class="aura-card gooey-card p-30 interactive reveal stagger-item" style="animation-delay: ${i * 0.12}s">
                        <div class="flex flex-between items-start mb-24">
                            <div class="profile-photo-wrapper" style="width: 70px; height: 70px; padding: 3px;">
                                <img src="${avatar}" style="width: 100%; height: 100%; border-radius: 50%;">
                                <div style="position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; background: ${profile.availability === 'Available' ? '#10b981' : '#f59e0b'}; border: 2px solid #0f172a; border-radius: 50%;"></div>
                            </div>
                            <button class="small-btn glass-btn magnetic" onclick="toggleBookmarkFreelancer('${profile.userId}')" style="padding: 8px;">
                                <i class="${isUserBookmarked ? 'fas' : 'far'} fa-bookmark" style="color: ${isUserBookmarked ? 'var(--accent-glow)' : 'white'}"></i>
                            </button>
                        </div>
                        
                        <div class="mb-24">
                            <h3 class="white shimmer-text font-800 mb-5" style="font-size: 1.4rem;">${profile.name}</h3>
                            <div class="tag-indigo small mb-15 inline-block">${profile.roleType || 'Specialist'}</div>
                            <p class="text-muted small line-clamp-3" style="line-height: 1.6;">${profile.bio || 'Data stream synchronization pending...'}</p>
                        </div>

                        <div class="flex flex-wrap gap-8 mb-30">
                            ${(profile.skills || []).slice(0, 4).map(skill => `<span class="tag-glass x-small">${skill}</span>`).join('')}
                            ${profile.skills.length > 4 ? `<span class="text-faint x-small">+${profile.skills.length - 4}</span>` : ''}
                        </div>

                        <div class="flex gap-12 pt-24" style="border-top: 1px solid rgba(255,255,255,0.05);">
                            <a href="messages.html?user=${profile.userId}" class="liquid-btn primary-btn flex-1 text-center" style="font-size: 0.85rem; padding: 12px;">HoloChat</a>
                            <a href="freelancer-profile.html?id=${profile.userId}" class="small-btn glass-btn magnetic" style="padding: 12px 18px;">Profile</a>
                        </div>
                    </div>
                `;
            }).join('');

            if (typeof initPremiumEffects === 'function') initPremiumEffects();
        }

        function toggleBookmarkFreelancer(freelancerId) {
            toggleBookmark(user.id, freelancerId);
            renderFreelancers();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', renderFreelancers);
        document.getElementById('roleFilter').addEventListener('change', renderFreelancers);
        document.getElementById('availabilityFilter').addEventListener('change', renderFreelancers);
        document.getElementById('sortBy').addEventListener('change', renderFreelancers);

        // Initial render
        renderFreelancers();
    </script>
</body>

</html>
