<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Button Preview — DevConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 48px;
            background: #0f172a;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }

        /* Animated background blobs */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 70%),
                radial-gradient(ellipse 400px 500px at 80% 70%, rgba(168, 85, 247, 0.10) 0%, transparent 70%);
            pointer-events: none;
        }

        h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #94a3b8;
            font-weight: 600;
        }

        .demo-row {
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .label {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: 8px;
        }

        .cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        /* ── Fake navbar context ── */
        .nav-demo {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 20px;
            border-radius: 16px;
        }

        .nav-logo {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hint {
            font-size: 13px;
            color: #64748b;
            text-align: center;
            max-width: 360px;
            line-height: 1.6;
        }

        .hint span {
            color: #818cf8;
        }

        /* ════════════════════════════════════════════════
           LOGOUT BUTTON CSS — exact copy from premium-global.css
           ════════════════════════════════════════════════ */

        .logoutButton {
            --figure-duration: 1000;
            --door-duration: 450;

            appearance: none;
            outline: none;
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: transparent;
            color: #fff;

            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px 10px 20px;

            border-radius: 100px;
            position: relative;
            overflow: hidden;

            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: transform 0.2s ease;
        }

        .logoutButton::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: #1e293b;
            border: 1.5px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .logoutButton:hover::before {
            background: #263347;
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
        }

        .logoutButton:hover {
            transform: translateY(-1px);
        }

        .logoutButton:active {
            transform: scale(0.97);
        }

        .logoutButton.falling::before {
            background: #450a0a !important;
            border-color: rgba(239, 68, 68, 0.55) !important;
            box-shadow: 0 0 22px rgba(239, 68, 68, 0.28) !important;
            transition-duration: 0.15s;
        }

        .logoutButton.falling {
            pointer-events: none;
        }

        .logoutButton .button-text {
            position: relative;
            z-index: 2;
            color: #fff;
            white-space: nowrap;
            transition:
                opacity calc(var(--door-duration) * 0.7ms) ease,
                transform calc(var(--door-duration) * 0.7ms) ease;
        }

        .logoutButton.falling .button-text {
            opacity: 0;
            transform: translateX(-5px);
        }

        /* DOORWAY */
        .logoutButton .doorway {
            position: relative;
            z-index: 2;
            width: 26px;
            height: 30px;
            flex-shrink: 0;

            background: #0c0a2e;
            border: 2.5px solid #6366f1;
            border-radius: 4px 4px 2px 2px;
            box-shadow:
                0 0 12px rgba(99, 102, 241, 0.55),
                inset 0 0 8px rgba(99, 102, 241, 0.22);

            perspective: 120px;
            perspective-origin: 0% 50%;
        }

        /* DOOR */
        .logoutButton .door {
            display: block;
            position: absolute;
            top: -3px;
            left: -3px;
            width: calc(100% + 6px);
            height: calc(100% + 6px);
            fill: #6366f1;
            transform-origin: 0% 50%;
            z-index: 2;
            transition: transform calc(var(--door-duration) * 1ms) cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logoutButton:hover .door,
        .logoutButton.falling .door {
            transform: rotateY(-125deg);
        }

        /* FIGURE */
        .logoutButton .figure {
            display: block;
            position: absolute;
            right: 6px;
            bottom: 5px;
            width: 14px;
            height: 16px;
            fill: #c7d2fe;
            z-index: 1;
            opacity: 0;
            transition:
                opacity calc(var(--door-duration) * 1ms) linear calc(var(--door-duration) * 0.3ms),
                bottom calc(var(--figure-duration) * 1ms) cubic-bezier(0.7, 0.1, 1, 1) 100ms;
        }

        .logoutButton:hover .figure {
            opacity: 1;
        }

        .logoutButton.falling .figure {
            right: 6px;
            bottom: -1080px;
            opacity: 0;
            animation: logoutSpin calc(var(--figure-duration) * 1ms) linear infinite;
            transition:
                bottom calc(var(--figure-duration) * 1ms) cubic-bezier(0.7, 0.1, 1, 1) 100ms,
                opacity calc(var(--figure-duration) * 0.25ms) linear calc(var(--figure-duration) * 0.75ms);
            z-index: 1;
        }

        @keyframes logoutSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Reset button */
        #resetBtn {
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #resetBtn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
    </style>
</head>

<body>

    <h1>Logout Button Preview</h1>

    <!-- Fake navbar to simulate real usage -->
    <div class="nav-demo">
        <span class="nav-logo">⬡ DevConnect</span>

        <button class="logoutButton" id="previewBtn">
            <span class="button-text">Log Out</span>
            <div class="doorway">
                <svg class="door" viewBox="0 0 24 28" xmlns="http://www.w3.org/2000/svg">
                    <!-- Main door fill — CSS fill:#6366f1 applied -->
                    <rect x="0" y="0" width="24" height="28" rx="2" />
                    <!-- Upper left glass panel -->
                    <rect x="2.5" y="2.5" width="8" height="10" rx="1" fill="rgba(255,255,255,0.25)" />
                    <!-- Upper right glass panel -->
                    <rect x="13.5" y="2.5" width="8" height="10" rx="1" fill="rgba(255,255,255,0.25)" />
                    <!-- Lower panel -->
                    <rect x="2.5" y="15.5" width="19" height="10" rx="1" fill="rgba(255,255,255,0.13)" />
                    <!-- Door knob -->
                    <circle cx="19.5" cy="14.5" r="1.8" fill="rgba(255,255,255,0.9)" />
                    <circle cx="19.5" cy="14.5" r="0.8" fill="rgba(150,150,200,0.6)" />
                </svg>
                <svg class="figure" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z" />
                </svg>
            </div>
        </button>
    </div>

    <p class="hint">
        <span>Hover</span> over the button → gate swings open<br>
        <span>Click</span> → person falls spinning → button logs out
    </p>

    <button id="resetBtn">↺ Reset Animation</button>

    <script>
        const btn = document.getElementById('previewBtn');
        const resetBtn = document.getElementById('resetBtn');

        btn.addEventListener('click', function () {
            if (btn.classList.contains('falling')) return;
            btn.classList.add('falling');

            // Reset after animation completes (no real logout in preview)
            setTimeout(() => {
                btn.classList.remove('falling');
            }, 2200);
        });

        resetBtn.addEventListener('click', () => {
            btn.classList.remove('falling');
        });
    </script>
</body>

</html>
