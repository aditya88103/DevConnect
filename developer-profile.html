<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Profile - DevConnect</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-container">
        <div class="bg-animation">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>

        <nav class="navbar">
            <div class="navbar-content">
                <a href="developer-dashboard.html" class="navbar-brand">
                    <svg class="navbar-brand-icon" viewBox="0 0 100 100" fill="none">
                        <path d="M30 20L50 40L70 20M30 80L50 60L70 80M20 30L40 50L20 70M80 30L60 50L80 70"
                            stroke="url(#gradient)" stroke-width="4" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea" />
                                <stop offset="100%" style="stop-color:#764ba2" />
                            </linearGradient>
                        </defs>
                    </svg>
                    DevConnect
                </a>
                <div class="navbar-actions">
                    <button class="theme-toggle"></button>
                    <button class="logout-btn" data-action="logout">Logout</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="card">
                <div class="profile-header">
                    <img src="https://ui-avatars.com/api/?name=Developer&background=667eea&color=fff"
                        alt="Profile Photo" class="profile-photo" id="profilePhoto">

                    <div class="profile-info">
                        <h1 class="profile-name" id="profileName">Developer Name</h1>
                        <p class="profile-role" id="profileRole">Full Stack Developer</p>
                        <div class="availability-badge available" id="availabilityBadge">Available</div>

                        <div class="profile-links">
                            <a href="developer-profile-form.html" class="profile-link-btn primary">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                                </svg>
                                Edit Profile
                            </a>
                            <a href="#" id="githubLink" class="profile-link-btn secondary" style="display: none;">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                                </svg>
                                GitHub
                            </a>
                            <a href="#" id="portfolioLink" class="profile-link-btn secondary" style="display: none;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                                </svg>
                                Portfolio
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    About
                </h2>
                <p id="profileBio" style="color: var(--text-secondary); line-height: 1.8;">Loading...</p>
            </div>

            <div class="card">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                    Skills
                </h2>
                <div id="profileSkills" class="developer-skills"></div>
            </div>

            <div class="card" id="projectsSection">
                <h2 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                    </svg>
                    Projects
                </h2>
                <div id="profileProjects" class="grid grid-2"></div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/theme.js"></script>
    <script>
        requireAuth('developer');

        const user = getCurrentUser();
        const profile = getDeveloperProfile(user.id);

        if (!profile) {
            window.location.href = 'developer-profile-form.html';
        } else {
            // Load profile data
            document.getElementById('profileName').textContent = profile.name;
            document.getElementById('profileRole').textContent = profile.roleType + ' Developer';
            document.getElementById('profileBio').textContent = profile.bio;

            if (profile.photo) {
                document.getElementById('profilePhoto').src = profile.photo;
            } else {
                document.getElementById('profilePhoto').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=667eea&color=fff`;
            }

            // Availability
            const availabilityBadge = document.getElementById('availabilityBadge');
            availabilityBadge.textContent = profile.availability;
            availabilityBadge.className = 'availability-badge ' + profile.availability.toLowerCase().replace(' ', '-');

            // Links
            if (profile.github) {
                const githubLink = document.getElementById('githubLink');
                githubLink.href = profile.github;
                githubLink.style.display = 'inline-flex';
            }

            if (profile.portfolio) {
                const portfolioLink = document.getElementById('portfolioLink');
                portfolioLink.href = profile.portfolio;
                portfolioLink.style.display = 'inline-flex';
            }

            // Skills
            const skillsHtml = profile.skills.map(skill => `
                <div class="skill-tag">
                    <span>${skill}</span>
                </div>
            `).join('');
            document.getElementById('profileSkills').innerHTML = skillsHtml;

            // Projects
            if (profile.projects && profile.projects.length > 0) {
                const projectsHtml = profile.projects.map(project => `
                    <div class="project-card">
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        ${project.technologies && project.technologies.length > 0 ? `
                            <div class="project-tech-tags">
                                ${project.technologies.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                            </div>
                        ` : ''}
                        ${project.link ? `
                            <a href="${project.link}" target="_blank" class="profile-link-btn secondary" style="display: inline-flex; margin-top: 0.5rem;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                                    <polyline points="15 3 21 3 21 9"/>
                                    <line x1="10" y1="14" x2="21" y2="3"/>
                                </svg>
                                View Project
                            </a>
                        ` : ''}
                    </div>
                `).join('');
                document.getElementById('profileProjects').innerHTML = projectsHtml;
            } else {
                document.getElementById('projectsSection').style.display = 'none';
            }
        }
    </script>
</body>

</html>
