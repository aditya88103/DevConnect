<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancer Dashboard | DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>
<body class="premium-layout">
    <div class="scroll-progress"></div>
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

    <nav class="navbar scrolled"><div class="nav-container">
        <div class="nav-left">
            <a href="index.html" class="logo">DevConnect</a>
            <div class="nav-links">
                <a href="freelancer-dashboard.html" class="active">Dashboard</a>
                <a href="messages.html">Messages</a>
                <a href="settings.html">Settings</a>
            </div>
        </div>
        <div class="nav-right">
             <a href="freelancer-profile.html" class="user-menu reveal">
                <img src="https://ui-avatars.com/api/?name=User" class="user-avatar" id="userAvatar">
            </a>
            <button class="logoutButton" data-action="logout-premium">Log Out</button>
        </div>
    </div></nav>

    <main class="main-content container mt-nav">
        <div class="dashboard-header reveal mb-40">
            <span class="section-tag-p">Talent Dashboard</span>
            <h1 class="shimmer-text">Premium Feed</h1>
            <p>High-value opportunities matching your skill set.</p>
        </div>

        <div class="grid-2-1">
            <div class="column-left">
                <section class="reveal">
                    <h2 class="white mb-24">Live Projects</h2>
                    <div id="projectsList" class="stagger-reveal">
                        <!-- Projects via JS -->
                    </div>
                </section>
            </div>
            <div class="side-column reveal">
                <div class="aura-card p-30 mb-30">
                    <h3 class="white mb-20">Your Profile</h3>
                    <a href="freelancer-profile-form.html" class="liquid-btn primary-btn w-100 block-center" style="text-align:center;">Update Skills</a>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        requireAuth('freelancer');
        const user = getCurrentUser();
        if(user.photo) document.getElementById('userAvatar').src = user.photo;
        
        const reqs = getClientRequirements();
        const list = document.getElementById('projectsList');
        
        if (reqs.length === 0) {
            list.innerHTML = '<div class=\"aura-card p-40 text-center text-muted\">No projects found. Check back soon!</div>';
        } else {
            list.innerHTML = reqs.map(r => 
                <div class=\"aura-card p-24 mb-20 interactive\" onclick=\"alert('Opening project...')\">
                    <div class=\"flex flex-between mb-15\">
                        <h4 class=\"white\"></h4>
                        <div class=\"tag-green\"></div>
                    </div>
                    <p class=\"text-muted small\"></p>
                </div>
            ).join('');
            initPremiumEffects();
        }
    </script>
</body>
</html>
