<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Requirement | DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>
<body class="premium-layout">
    <div class="scroll-progress"></div>
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <nav class="navbar scrolled"><div class="nav-container"><a href="owner-dashboard.html" class="logo">DevConnect</a></div></nav>

    <main class="main-content container mt-nav">
        <div class="aura-card p-40 reveal" style="max-width: 800px; margin: 0 auto;">
            <header class="mb-40">
                <span class="section-tag-p">New Project</span>
                <h1 class="shimmer-text">Define Your Requirement</h1>
                <p class="text-muted">Explain what you need to build and find the perfect match.</p>
            </header>

            <form id="requirementForm" class="stagger-reveal">
                <div class="form-group mb-20">
                    <label class="white mb-8 block">Project Type</label>
                    <select id="projectType" class="glass-input w-100" required>
                        <option value=\"Web Development\">Web Development</option>
                        <option value=\"Mobile App\">Mobile App</option>
                        <option value=\"UI/UX Design\">UI/UX Design</option>
                        <option value=\"Graphic Design\">Graphic Design</option>
                    </select>
                </div>

                <div class="grid-2 gap-20 mb-20">
                    <div class="form-group">
                        <label class="white mb-8 block">Estimated Budget</label>
                        <input type="text" id="budget" class="glass-input w-100" placeholder=\"e.g.  - \" required>
                    </div>
                    <div class="form-group">
                        <label class="white mb-8 block">Preferred Deadline</label>
                        <input type="date" id="deadline" class="glass-input w-100" required>
                    </div>
                </div>

                <div class="form-group mb-30">
                    <label class="white mb-8 block">Project Description</label>
                    <textarea id="description" class="glass-input w-100" rows=\"6\" placeholder=\"Describe the tasks, goals, and required skills...\" required></textarea>
                </div>

                <div class="flex gap-20">
                    <button type="submit" class="liquid-btn primary-btn" style="flex: 2;">Post Requirement</button>
                    <a href="owner-dashboard.html" class="cta-outline" style="flex: 1; text-align: center;">Discard</a>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        requireAuth('owner');
        const user = getCurrentUser();

        document.getElementById('requirementForm').onsubmit = (e) => {
            e.preventDefault();
            const req = {
                id: Date.now().toString(),
                userId: user.id,
                projectType: document.getElementById('projectType').value,
                budget: document.getElementById('budget').value,
                deadline: document.getElementById('deadline').value,
                description: document.getElementById('description').value,
                createdAt: new Date().toISOString()
            };
            const reqs = getClientRequirements();
            reqs.push(req);
            saveClientRequirements(reqs);
            window.location.href = 'owner-dashboard.html';
        };
    </script>
</body>
</html>
