<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>

<body>
    <div class="dashboard-container">
        <div class="bg-animation">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>

        <nav class="navbar">
            <div class="navbar-content">
                <a href="#" class="navbar-brand" id="dashboardLink">
                    <svg class="navbar-brand-icon" viewBox="0 0 100 100" fill="none">
                        <path d="M30 20L50 40L70 20M30 80L50 60L70 80M20 30L40 50L20 70M80 30L60 50L80 70"
                            stroke="url(#gradient)" stroke-width="4" stroke-linecap="round" />
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea" />
                                <stop offset="100%" style="stop-color:#764ba2" />
                            </linearGradient>
                        </defs>
                    </svg>
                    DevConnect
                </a>
                <div class="navbar-actions">
                    <button class="logoutButton" data-action="logout-premium">
                        <span class="button-text">Log Out</span>
                        <div class="doorway">
                            <svg class="door" viewBox="0 0 24 28" xmlns="http://www.w3.org/2000/svg">
                                <!-- Main door fill — CSS sets colour to indigo -->
                                <rect x="0" y="0" width="24" height="28" rx="2"/>
                                <!-- Upper left glass panel -->
                                <rect x="2.5" y="2.5" width="8" height="10" rx="1" fill="rgba(255,255,255,0.25)"/>
                                <!-- Upper right glass panel -->
                                <rect x="13.5" y="2.5" width="8" height="10" rx="1" fill="rgba(255,255,255,0.25)"/>
                                <!-- Lower panel -->
                                <rect x="2.5" y="15.5" width="19" height="10" rx="1" fill="rgba(255,255,255,0.13)"/>
                                <!-- Door knob -->
                                <circle cx="19.5" cy="14.5" r="1.8" fill="rgba(255,255,255,0.9)"/>
                                <circle cx="19.5" cy="14.5" r="0.8" fill="rgba(150,150,200,0.6)"/>
                            </svg>
                            <svg class="figure" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Messages</h1>
                <p class="page-subtitle">Your conversations</p>
            </div>

            <div id="messagesList"></div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/chat.js"></script>
    <script>
        requireAuth();

        const user = getCurrentUser();

        // Set dashboard link based on role
        const dashboardLink = document.getElementById('dashboardLink');
        if (user.role === 'freelancer') {
            dashboardLink.href = 'freelancer-dashboard.html';
        } else {
            dashboardLink.href = 'owner-dashboard.html';
        }
    </script>
</body>

</html>
