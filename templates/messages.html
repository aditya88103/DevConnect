<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>
<body class="premium-layout">
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-2"></div></div>

    <nav class="navbar scrolled"><div class="nav-container">
        <a href="index.html" class="logo">DevConnect</a>
        <div class="nav-links">
            <a href="messages.html" class="active">Inbox</a>
        </div>
    </div></nav>

    <main class="main-content container mt-nav">
        <div class="grid-1-3" style="height: calc(100vh - 150px);">
            <aside class="aura-card reveal" style="height: 100%; display: flex; flex-direction: column;">
                <div class="p-24 border-bottom">
                    <h3 class="white">Recent Chats</h3>
                </div>
                <div id="contactsList" class="p-10 stagger-reveal" style="flex: 1; overflow-y: auto;">
                    <!-- Contacts via JS -->
                </div>
            </aside>

            <section class="aura-card reveal" style="height: 100%; display: flex; align-items: center; justify-content: center; text-align: center;">
                <div class="p-40">
                    <div class="icon mb-20" style="font-size: 3rem; opacity: 0.3;">💬</div>
                    <h2 class="white mb-10">Your Conversations</h2>
                    <p class="text-muted">Select a contact from the sidebar to start messaging.</p>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        const user = getCurrentUser();
        const requirements = getClientRequirements();
        const contactsList = document.getElementById('contactsList');
        
        // Mock list based on available users/projects
        const users = getAllUsers().filter(u => u.id !== user.id).slice(0, 5);
        contactsList.innerHTML = users.map(u => 
            <a href=\"chat.html?user=\" class=\"aura-card p-15 mb-8 interactive flex items-center gap-15\" style=\"border-radius: 12px;\">
                <img src=\"https://ui-avatars.com/api/?name=&background=6366f1&color=fff\" style=\"width: 40px; height: 40px; border-radius: 50%;\">
                <div><p class=\"white bold\"></p><p class=\"text-faint small\">Last active: Today</p></div>
            </a>
        ).join('');
    </script>
</body>
</html>
