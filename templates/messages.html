<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloChat | DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>
<body class="premium-layout">
    <div class="page-loader"><div class="loader-orb"></div></div>
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

    <nav class="navbar scrolled"><div class="nav-container">
        <a href="index.html" class="logo magnetic">DevConnect</a>
        <div class="nav-links">
            <a href="messages.html" class="active">Sub-Space Inbox</a>
        </div>
    </div></nav>

    <main class="main-content container mt-nav">
        <div class="grid-1-3" style="height: calc(100vh - 180px);">
            <aside class="aura-card reveal" style="height: 100%; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.4);">
                <div class="p-24 border-bottom">
                    <h3 class="white shimmer-text font-700">Comms Logic</h3>
                </div>
                <div id="contactsList" class="p-15 stagger-reveal" style="flex: 1; overflow-y: auto;">
                    <!-- Contacts via JS -->
                </div>
            </aside>

            <section class="aura-card neon-border reveal" style="height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; background: rgba(15, 23, 42, 0.2);">
                <div class="p-40">
                    <div class="icon mb-30" style="font-size: 4rem; opacity: 0.2; animation: floatPremium 4s ease-in-out infinite;">📡</div>
                    <h2 class="white shimmer-text mb-15 font-900" style=\"font-size: 2.5rem;\">Frequency Established</h2>
                    <p class="text-muted" style=\"max-width: 400px; margin: 0 auto;\">Select an encrypted node from the terminal to initialize secure communication.</p>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        const user = getCurrentUser();
        const contactsList = document.getElementById('contactsList');
        
        // Dynamic contact list
        const users = getAllUsers().filter(u => u.id !== user.id).slice(0, 8);
        contactsList.innerHTML = users.map(u => 
            <a href=\"chat.html?user=\" class=\"aura-card gooey-card p-15 mb-10 interactive flex items-center gap-15\" style=\"border-radius: 16px;\">
                <div class=\"profile-photo-wrapper\" style=\"width: 45px; height: 45px;\">
                    <img src=\"https://ui-avatars.com/api/?name=&background=6366f1&color=fff\" style=\"width: 100%; height: 100%; border-radius: 50%;\">
                </div>
                <div style=\"flex: 1;\">
                    <p class=\"white bold small\"></p>
                    <p class=\"text-faint\" style=\"font-size: 0.7rem;\">Status: Static Stable</p>
                </div>
                <div style=\"width: 8px; height: 8px; border-radius: 50%; background: #10b981;\"></div>
            </a>
        ).join('');
        initPremiumEffects();
    </script>
</body>
</html>
