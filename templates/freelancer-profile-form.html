<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>
<body class="premium-layout">
    <div class="scroll-progress"></div>
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    
    <nav class="navbar scrolled"><div class="nav-container"><a href="freelancer-dashboard.html" class="logo">DevConnect</a></div></nav>

    <main class="main-content container mt-nav">
        <div class="aura-card p-40 reveal" style="max-width: 800px; margin: 0 auto;">
            <header class="mb-40">
                <span class="section-tag-p">Profile Settings</span>
                <h1 class="shimmer-text">Personal Details</h1>
                <p class="text-muted">Fill in your professional information to get discovered.</p>
            </header>

            <form id="profileForm" class="stagger-reveal">
                <div class="grid-2 gap-20 mb-20">
                    <div class="form-group">
                        <label class="white mb-8 block">Project Title/Niche</label>
                        <input type="text" id="title" class="glass-input w-100" placeholder="e.g. Senior UI/UX Designer" required>
                    </div>
                    <div class="form-group">
                        <label class="white mb-8 block">Location</label>
                        <input type="text" id="location" class="glass-input w-100" placeholder="e.g. New York, USA" required>
                    </div>
                </div>

                <div class="form-group mb-20">
                    <label class="white mb-8 block">Professional Bio</label>
                    <textarea id="bio" class="glass-input w-100" rows="5" placeholder="Tell owners about your experience..." required></textarea>
                </div>

                <div class="form-group mb-30">
                    <label class="white mb-8 block">Skills (Comma separated)</label>
                    <input type="text" id="skills" class="glass-input w-100" placeholder="React, Node.js, Figma, Python" required>
                </div>

                <div class="flex gap-20">
                    <button type="submit" class="liquid-btn primary-btn" style="flex: 2;">Save Profile</button>
                    <a href="freelancer-dashboard.html" class="cta-outline" style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        requireAuth('freelancer');
        const user = getCurrentUser();
        if (user.title) document.getElementById('title').value = user.title;
        if (user.location) document.getElementById('location').value = user.location;
        if (user.bio) document.getElementById('bio').value = user.bio;
        if (user.skills) document.getElementById('skills').value = user.skills.join(', ');

        document.getElementById('profileForm').onsubmit = (e) => {
            e.preventDefault();
            const updated = {
                ...user,
                title: document.getElementById('title').value,
                location: document.getElementById('location').value,
                bio: document.getElementById('bio').value,
                skills: document.getElementById('skills').value.split(',').map(s => s.trim())
            };
            updateUser(updated);
            alert('Profile updated successfully!');
            window.location.href = 'freelancer-dashboard.html';
        };
    </script>
</body>
</html>
