<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard | DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>
<body class="premium-layout">
    <div class="scroll-progress"></div>
    <div class="cursor-glow"></div>
    <div class="orb-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <nav class="navbar scrolled"><div class="nav-container">
        <div class="nav-left"><a href="index.html" class="logo">DevConnect</a></div>
        <div class="nav-right">
            <button class="logoutButton" data-action="logout-premium">Log Out</button>
        </div>
    </div></nav>
    <main class="main-content container mt-nav">
        <div class="dashboard-header reveal">
            <span class="section-tag-p">Management</span>
            <h1 class="shimmer-text">Dashboard</h1>
        </div>
        <div id="requirementsContainer" class="stagger-reveal"></div>
    </main>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        requireAuth('owner');
        const user = getCurrentUser();
        const reqs = getClientRequirements().filter(r => r.userId === user.id);
        const container = document.getElementById('requirementsContainer');
        container.innerHTML = reqs.map(r => '<div class=\"aura-card p-24 mb-20\">' + r.projectType + '</div>').join('');
        initPremiumEffects();
    </script>
</body>
</html>
