<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile | DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>
<body class="premium-layout">
    <div class="scroll-progress"></div>
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-1"></div><div class="orb orb-3"></div></div>

    <nav class="navbar scrolled"><div class="nav-container">
        <a href="freelancer-dashboard.html" class="logo">DevConnect</a>
        <div class="nav-right">
            <a href="freelancer-profile-form.html" class="cta-outline">Edit Profile</a>
        </div>
    </div></nav>

    <main class="main-content container mt-nav">
        <div class="grid-1-2">
            <div class="side-col reveal">
                <div class="aura-card p-30 text-center">
                    <div class="profile-photo-wrapper mb-20" style="width: 150px; height: 150px; margin: 0 auto;">
                        <img src="" id="profileImg" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #1e293b;">
                    </div>
                    <h2 id="profileName" class="white mb-8">User Name</h2>
                    <p id="profileTitle" class="text-muted small mb-20">Professional Title</p>
                    <div class="flex flex-center gap-10">
                        <span class="tag-indigo">Freelancer</span>
                        <span id="profileLocation" class="text-faint small">Location</span>
                    </div>
                </div>
            </div>

            <div class="main-col stagger-reveal">
                <section class="aura-card p-40 mb-30">
                    <h3 class="white mb-20">About Me</h3>
                    <p id="profileBio" class="text-muted line-height-1.8">No bio provided yet.</p>
                </section>

                <section class="aura-card p-40">
                    <h3 class="white mb-20">Expertise & Skills</h3>
                    <div id="skillsList" class="flex flex-wrap gap-10">
                        <!-- Skills via JS -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
    <script>
        requireAuth('freelancer');
        const user = getCurrentUser();
        document.getElementById('profileImg').src = user.photo || 'https://ui-avatars.com/api/?name=' + user.name;
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileTitle').textContent = user.title || 'Professional Freelancer';
        document.getElementById('profileLocation').textContent = user.location || 'Remote';
        document.getElementById('profileBio').textContent = user.bio || 'This freelancer hasn\'t written a bio yet.';
        
        if (user.skills) {
            document.getElementById('skillsList').innerHTML = user.skills.map(s => 
                <span class=\"tag-indigo\" style=\"padding: 8px 16px; border-radius: 8px;\"></span>
            ).join('');
        }
    </script>
</body>
</html>
