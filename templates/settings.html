<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | DevConnect</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/premium-global.css">
</head>
<body class="premium-layout">
    <div class="cursor-glow"></div>
    <div class="orb-container"><div class="orb orb-1"></div></div>

    <nav class="navbar scrolled"><div class="nav-container"><a href="index.html" class="logo">DevConnect</a></div></nav>

    <main class="main-content container mt-nav">
        <div class="dashboard-header reveal mb-40">
            <h1 class="shimmer-text">Account Settings</h1>
            <p>Manage your account preferences and security.</p>
        </div>

        <div class="stagger-reveal" style="max-width: 800px; margin: 0 auto;">
            <section class="aura-card p-30 mb-24">
                <h3 class="white mb-20">Security</h3>
                <div class="flex flex-between items-center mb-15">
                    <div><p class="white">Two-Factor Authentication</p><p class="text-faint small">Secure your account with 2FA</p></div>
                    <button class="cta-outline">Enable</button>
                </div>
            </section>

            <section class="aura-card p-30 mb-24">
                <h3 class="white mb-20">Privacy</h3>
                <div class="flex flex-between items-center">
                    <div><p class="white">Profile Visibility</p><p class="text-faint small">Control who can see your profile</p></div>
                    <span class="tag-green">Public</span>
                </div>
            </section>

            <section class="aura-card p-30 border-red" style="border-color: rgba(239, 68, 68, 0.2);">
                <h3 class="red mb-10">Danger Zone</h3>
                <p class="text-muted small mb-20">Irreversible actions for your account.</p>
                <button class="cta-outline" style="color: #ef4444; border-color: #ef4444;">Delete Account</button>
            </section>
        </div>
    </main>
    <script src="../js/auth.js"></script>
    <script src="../js/premium-effects.js"></script>
</body>
</html>
